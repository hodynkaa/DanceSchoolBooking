<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - Szkoła Tańca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-color: #EAE5F3;
            --card-bg: #FFFFFF;
            --primary-color: #A392CC;
            --primary-hover: #8D7AB8;
            --text-main: #1A1326;
            --text-muted: #433952;
            --input-border: #BBAECF;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .auth-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(26, 19, 38, 0.08);
            border: 1.5px solid rgba(163, 146, 204, 0.35);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-header h1 {
            font-size: 2.3rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 22px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .form-group input {
            background-color: #FDFBFF;
            border: 2px solid var(--input-border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
            width: 100%;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(163, 146, 204, 0.25);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            background-color: var(--primary-color);
            color: #FFFFFF;
            box-shadow: 0 6px 20px rgba(163, 146, 204, 0.45);
            transition: all 0.2s ease;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(163, 146, 204, 0.55);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <header class="auth-header">
            <h1>Witaj ponownie</h1>
            <p>Zaloguj się do swojego konta</p>
        </header>

        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Adres E-mail</label>
                <input type="email" id="login-email" required>
            </div>

            <div class="form-group">
                <label for="login-password">Hasło</label>
                <input type="password" id="login-password" required>
            </div>

            <button type="submit" class="btn-submit">Zaloguj się</button>
        </form>

        <footer class="auth-footer">
            Nie masz jeszcze konta? <a href="register.html">Zarejestruj się</a>
        </footer>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            fetch('http://localhost:8080/api/users/login', { // Перевірте цей ендпоінт на бекенді
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    } else {
                        throw new Error('Nieprawidłowy email lub hasło.');
                    }
                })
                .then(user => {
                    
                    localStorage.setItem('userId', user.id);
                    localStorage.setItem('userName', user.name);
                    localStorage.setItem('userRole', user.role);

                    alert(`Witaj ponownie, ${user.name}!`);
                    window.location.href = 'index.html'; 
                })
                .catch(error => {
                    console.error('Błąd:', error);
                    alert(error.message);
                });
        });
    </script>
</body>

</html>
